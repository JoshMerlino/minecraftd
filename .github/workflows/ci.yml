name: CI/CD

on:
  push:
    branches:
      - master
      - "**"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Configure git
        run: |
          git config --global user.name 'CI/CD'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: "Lint"
        run: bun lint || true

      - name: Commit changes
        run: |
          git add .
          git reset -- bun.lockb
          git commit -m "Eslint: fix all" || true
          git push || true

  version:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git
        run: |
          git config --global user.name 'CI/CD'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Bump version
        run: |
          if git diff --name-only HEAD^ | grep -E 'src/|package.json'; then
            npm version patch -m "Bump version to %s" || true
          fi

      - name: Commit changes
        run: |
          git add .
          git reset -- package-lock.json
          git commit -m "Bump version" || true
          git push || true
